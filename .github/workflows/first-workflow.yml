      - name: Test Step
        run: |
          echo "Running tests"
          sleep 10
          echo "Tests finished"
        
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy Step
        run: |
          echo "Deploying application"
          sleep 5
          echo "Deployment Done


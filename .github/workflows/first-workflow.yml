name: Job output Demo

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version}}

    steps:
      - name: SET Version
        id: set_version
        run: echo "version=1.0.${{github.run_number}}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Use version
        run: echo "Deploying version ${{needs.build.outputs.version}}"
name: Env variables demo

on:
    push:
        branches:
            - main

jobs:
    demo:
        runs-on: ubuntu-latest
        
        env:
            APP_NAME: my-app
            VERSION: 1.0
        
        steps:
            - name: Print env variables
              run: |
               echo "APP_NAME is ${{env.APP_NAME}}"
               echo "VERSION is ${{env.VERSION}}"
            - name: Use Secret
              run: |
                echo "SECRET_KEY is ${{secrets.MY_SECRET}}"
name: conditional deploy

on:
    push:
      branches:
        - main
        - dev

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - run: |
                echo "Hello World.."
    deploy:
        runs-on: ubuntu-latest
        needs: build
        if:
            github.ref == 'refs/heads/main'
        steps:
            - run: echo "Deploying only if it is a main branch"

name: Artifact Demo

on:
    push:
        branches:
            - main
        paths:
        - '.github/workflows/passing_btw_jobs.yml'
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Create a file
              run: |
                 echo "This is my first workflow! of build output" > output.txt
                 ls -la
            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with: 
                name: my-artifact
                path: output.txt
    deploy:
        runs-on: ubuntu-latest
        needs: build
       
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                 name: my-artifact
            - name: Show Downloaded file
              run: |
                ls -la
                cat output.txt